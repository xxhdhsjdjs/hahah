<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>长沙柏嘉装饰设计工程有限公司</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #f7f8fa;
        }

        /* 顶部横幅 */
        .top-banner {
            background: linear-gradient(to right, #2c3e50, #4ca1af);
            color: white;
            text-align: center;
            padding: 50px 20px;
        }

        .top-banner h1 {
            font-size: 26px;
            margin-bottom: 10px;
        }

        .top-banner p {
            font-size: 16px;
            opacity: 0.95;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 信息卡片 */
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .card h2 {
            font-size: 20px;
            color: #2c3e50;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-item {
            font-size: 16px;
            line-height: 2.2;
            color: #333;
        }

        .info-item strong {
            width: 90px;
            display: inline-block;
            color: #2c3e50;
        }

        /* 业务板块（带图案样式）*/
        .services {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }

        .service {
            flex: 1;
            min-width: 250px;
            background: #eef7ff;
            padding: 25px;
            border-radius: 14px;
            text-align: center;
            border: 1px solid #d1e7ff;
        }

        .service h3 {
            font-size: 18px;
            color: #2b85c4;
            margin-bottom: 12px;
        }

        .service p {
            color: #555;
            line-height: 1.7;
        }

        /* 联系按钮 */
        .call-btn {
            display: block;
            width: fit-content;
            margin: 20px auto;
            background: #2b85c4;
            color: white;
            padding: 14px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
        }

        /* 底部 */
        .footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 30px 20px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <div class="top-banner">
        <h1>🏠 长沙柏嘉装饰设计工程有限公司</h1>
        <p>专业装修设计 · 旧房改造 · 品质整装</p>
    </div>

    <div class="container">

        <div class="card">
            <h2>📌 公司信息</h2>
            <div class="info-item"><strong>公司名称：</strong>长沙柏嘉装饰设计工程有限公司</div>
            <div class="info-item"><strong>联系电话：</strong>13984038220</div>
            <div class="info-item"><strong>公司地址：</strong>湖南省长沙市岳麓区望岳街道金星北路一段22号恒晟商厦201房-670</div>
            <a href="tel:13984038220" class="call-btn">📞 立即联系我们</a>
        </div>

        <div class="card">
            <h2>🛠️ 核心业务</h2>
            <div class="services">
                <div class="service">
                    <h3>✨ 装修设计</h3>
                    <p>全屋设计、新房装修、风格定制、空间规划，打造舒适理想家居环境。</p>
                </div>
                <div class="service">
                    <h3>🏚️ 旧房改造</h3>
                    <p>老房翻新、二手房改造、厨卫升级、墙面翻新，让旧房焕然一新。</p>
                </div>
            </div>
        </div>

    </div>

    <div class="footer">
        <p>© 2026 长沙柏嘉装饰设计工程有限公司 版权所有</p>
        <br>
        <p>专业装修 | 旧房改造 | 品质工程</p>
    </div>

</body>
</html>
